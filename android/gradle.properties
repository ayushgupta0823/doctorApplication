org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# The project lives on a different drive letter than the Gradle/Pub caches
# (D:\ vs C:\). Kotlin's incremental compiler cache does path relativization
# that throws "this and base files have different roots" across drives, so
# incremental Kotlin compilation is disabled here to avoid that crash.
kotlin.incremental=false
