name: mediconnect_doctor_app
description: MediConnectAI - Doctor App (Flutter port of the doctor_app.html prototype)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  pdf: ^3.11.1
  printing: ^5.13.3
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2
  path_provider: ^2.1.6
  record: ^7.1.1
  just_audio: ^0.10.6
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
